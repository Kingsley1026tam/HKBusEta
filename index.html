<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HK Bus App</title>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <style>
        :root {
            --bg-color: #f4dfd3; 
            --nav-bg: #1c1c1c; 
            --active-color: #df8555; 
            --text-color: #333;
            /* Company Colors */
            --kmb-color: #ed1d24;
            --ctb-color: #fccc0a;
            --ctb-text: #00558e;
            --nlb-color: #007a61;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh; 
            overflow: hidden; 
        }

        .app-container {
            width: 100%; max-width: 400px; height: 100dvh;
            background-color: var(--bg-color);
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* --- Pages --- */
        .page {
            display: none; flex: 1; flex-direction: column;
            padding: 20px; overflow-y: auto; overflow-x: hidden;
            padding-bottom: 80px; /* Space for nav */
        }
        .page.active { display: flex; }
        
        /* Hide scrollbar */
        .page::-webkit-scrollbar { display: none; }
        .page { -ms-overflow-style: none; scrollbar-width: none; }

        h1 { font-size: 24px; margin-bottom: 15px; color: var(--text-color); }
        .sub-title { font-size: 14px; color: #666; margin-top: -10px; margin-bottom: 20px;}

        /* --- Route Cards (Two Directions) --- */
        .route-card {
            background: #fff; border-radius: 15px; padding: 10px;
            margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .route-header {
            font-size: 20px; font-weight: bold; margin-bottom: 10px;
            padding-bottom: 5px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;
        }
        .company-badge {
            font-size: 12px; padding: 3px 8px; border-radius: 10px; color: white;
        }
        .direction-box {
            padding: 12px; border-radius: 10px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center;
            color: white; font-weight: bold;
        }
        .direction-box:last-child { margin-bottom: 0; }
        .stop-name { font-size: 14px; font-weight: normal; opacity: 0.9; }
        .eta-time { font-size: 22px; }

        /* Company Backgrounds */
        .bg-kmb { background-color: var(--kmb-color); }
        .bg-ctb { background-color: var(--ctb-color); color: var(--ctb-text); }
        .bg-nlb { background-color: var(--nlb-color); }
        .bg-joint { background: linear-gradient(135deg, var(--kmb-color) 50%, var(--ctb-color) 50%); color: white; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }

        /* --- Custom Keyboard --- */
        .search-display {
            background: #fff; padding: 15px; border-radius: 15px; font-size: 28px;
            text-align: center; font-weight: bold; margin-bottom: 20px; min-height: 60px;
            letter-spacing: 2px;
        }
        .keyboard {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
        }
        .key {
            background: #fff; border: none; padding: 20px; border-radius: 15px;
            font-size: 20px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            cursor: pointer; transition: 0.1s;
        }
        .key:active { background: #e0e0e0; transform: scale(0.95); }
        .key.action { background: var(--active-color); color: white; }

        /* --- Navigation --- */
        .nav-container {
            position: absolute; bottom: 0; width: 100%; padding: 0 20px 20px 20px;
            background: transparent; z-index: 10;
        }
        .nav-bar {
            position: relative; background: var(--nav-bg); height: 70px;
            border-radius: 25px; display: flex; justify-content: space-around; align-items: center;
        }
        .nav-item {
            width: 60px; height: 60px; display: flex; justify-content: center; align-items: center;
            z-index: 2; cursor: pointer; color: #888; transition: 0.3s; font-size: 24px;
        }
        .nav-item.active { color: #fff; transform: translateY(-22px); }
        .indicator {
            position: absolute; top: -22px; width: 60px; height: 60px;
            background: var(--active-color); border-radius: 50%;
            border: 8px solid var(--bg-color); transition: 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 1;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div id="page-home" class="page active">
        <h1>My Routes</h1>
        <p class="sub-title">Nearest arrival times</p>
        <div id="home-routes">
            <p style="text-align: center; color: #888; margin-top: 50px;">Go to Search to find a route!</p>
        </div>
    </div>

    <div id="page-search" class="page">
        <h1>Search Route</h1>
        <p class="sub-title">Find ETA by Route Number</p>
        
        <div class="search-display" id="searchInput"></div>
        
        <div class="keyboard">
            <button class="key" onclick="typeKey('1')">1</button>
            <button class="key" onclick="typeKey('2')">2</button>
            <button class="key" onclick="typeKey('3')">3</button>
            <button class="key" onclick="typeKey('4')">4</button>
            <button class="key" onclick="typeKey('5')">5</button>
            <button class="key" onclick="typeKey('6')">6</button>
            <button class="key" onclick="typeKey('7')">7</button>
            <button class="key" onclick="typeKey('8')">8</button>
            <button class="key" onclick="typeKey('9')">9</button>
            <button class="key" onclick="typeKey('X')">X</button>
            <button class="key" onclick="typeKey('0')">0</button>
            <button class="key" onclick="typeKey('A')">A</button>
            <button class="key action" onclick="clearKey()">CLR</button>
            <button class="key" onclick="typeKey('B')">B</button>
            <button class="key action" onclick="searchRoute()">GO</button>
        </div>
        <p id="search-status" style="text-align:center; margin-top: 15px; font-weight:bold;"></p>
    </div>

    <div id="page-settings" class="page">
        <h1>Settings</h1>
        <p class="sub-title">App Preferences</p>
        <div class="route-card">
            <p><strong>Language:</strong> English</p>
            <hr style="margin:10px 0; border:0; border-top:1px solid #eee;">
            <p><strong>Theme:</strong> Light (Peachy)</p>
            <hr style="margin:10px 0; border:0; border-top:1px solid #eee;">
            <p><strong>Clear Saved Routes:</strong> <button onclick="clearHome()" style="padding:5px; border-radius:5px; border:none; background:#ff4d4d; color:white;">Clear</button></p>
        </div>
    </div>

    <div class="nav-container">
        <div class="nav-bar">
            <div class="indicator" id="indicator"></div>
            <div class="nav-item active" onclick="switchPage('home', 0, this)"><ion-icon name="home-outline"></ion-icon></div>
            <div class="nav-item" onclick="switchPage('search', 1, this)"><ion-icon name="search-outline"></ion-icon></div>
            <div class="nav-item" onclick="switchPage('settings', 2, this)"><ion-icon name="settings-outline"></ion-icon></div>
        </div>
    </div>
</div>

<script>
    // --- Navigation & Page Switching ---
    function switchPage(pageId, index, element) {
        // Move Indicator
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => item.classList.remove('active'));
        element.classList.add('active');
        document.getElementById('indicator').style.left = `${element.offsetLeft}px`;

        // Switch Page Visibility
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(`page-${pageId}`).classList.add('active');
    }

    // Initialize nav position on load
    window.onload = () => {
        const activeItem = document.querySelector('.nav-item.active');
        document.getElementById('indicator').style.left = `${activeItem.offsetLeft}px`;
    };

    // --- Custom Keyboard Logic ---
    let currentInput = "";
    function typeKey(val) {
        if(currentInput.length < 5) {
            currentInput += val;
            document.getElementById('searchInput').innerText = currentInput;
        }
    }
    function clearKey() {
        currentInput = "";
        document.getElementById('searchInput').innerText = "";
        document.getElementById('search-status').innerText = "";
    }
    function clearHome() {
        document.getElementById('home-routes').innerHTML = '<p style="text-align: center; color: #888; margin-top: 50px;">Go to Search to find a route!</p>';
        alert('Home cleared!');
    }

    // --- Bus API Logic ---
    async function searchRoute() {
        const route = currentInput;
        if (!route) return;

        const statusLabel = document.getElementById('search-status');
        statusLabel.innerText = "Searching KMB & CTB...";
        statusLabel.style.color = "var(--active-color)";

        try {
            // Check KMB and CTB concurrently
            const [kmbRes, ctbRes] = await Promise.all([
                fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-eta/${route}/1`).then(r => r.json()).catch(() => null),
                fetch(`https://rt.data.gov.hk/v2/transport/citybus/route-eta/CTB/${route}`).then(r => r.json()).catch(() => null)
            ]);

            let hasKmb = kmbRes && kmbRes.data && kmbRes.data.length > 0;
            let hasCtb = ctbRes && ctbRes.data && ctbRes.data.length > 0;

            if (!hasKmb && !hasCtb) {
                statusLabel.innerText = "Route not found.";
                statusLabel.style.color = "red";
                return;
            }

            // Determine Company / Joint Status
            let companyClass = "bg-joint";
            let companyName = "Joint Route";
            if (hasKmb && !hasCtb) { companyClass = "bg-kmb"; companyName = "KMB"; }
            else if (!hasKmb && hasCtb) { companyClass = "bg-ctb"; companyName = "CTB"; }

            // Aggregate Data: We want the soonest ETA for Outbound (I) and Inbound (O)
            let dir1 = { dest: "Unknown", eta: 999, stopName: "" };
            let dir2 = { dest: "Unknown", eta: 999, stopName: "" };

            // Helper to process ETAs
            const processData = (dataList) => {
                const now = new Date();
                dataList.forEach(item => {
                    if (!item.eta) return;
                    let etaTime = new Date(item.eta);
                    let diffMins = Math.round((etaTime - now) / 60000);
                    if (diffMins < 0) return;

                    // Group by direction (I or O, Outbound/Inbound)
                    let destName = item.dest_tc || item.dest_en;
                    if (item.dir === 'O') {
                        if (diffMins < dir1.eta) {
                            dir1.eta = diffMins;
                            dir1.dest = destName;
                            dir1.stopName = "Nearest Station"; // Simplified without GPS
                        }
                    } else if (item.dir === 'I') {
                        if (diffMins < dir2.eta) {
                            dir2.eta = diffMins;
                            dir2.dest = destName;
                            dir2.stopName = "Nearest Station";
                        }
                    }
                });
            };

            if (hasKmb) processData(kmbRes.data);
            if (hasCtb) processData(ctbRes.data); // CTB returns similar structure for ETAs

            // Build HTML Blocks
            let html = `
                <div class="route-card">
                    <div class="route-header">
                        <span>Route ${route}</span>
                        <span class="company-badge ${companyClass}">${companyName}</span>
                    </div>
            `;

            if (dir1.eta !== 999) html += createDirectionBox(dir1, companyClass);
            if (dir2.eta !== 999) html += createDirectionBox(dir2, companyClass);

            html += `</div>`;

            // Append to Home Page
            const homeDiv = document.getElementById('home-routes');
            if(homeDiv.innerHTML.includes("Go to Search")) homeDiv.innerHTML = "";
            homeDiv.innerHTML = html + homeDiv.innerHTML; // Add to top

            // Clear search and switch to home automatically
            clearKey();
            switchPage('home', 0, document.querySelectorAll('.nav-item')[0]);

        } catch (error) {
            statusLabel.innerText = "Error fetching data.";
            statusLabel.style.color = "red";
            console.error(error);
        }
    }

    function createDirectionBox(dirObj, bgClass) {
        let timeStr = dirObj.eta === 0 ? "Arriving" : `${dirObj.eta} min`;
        return `
            <div class="direction-box ${bgClass}">
                <div>
                    <div>To ${dirObj.dest}</div>
                    <div class="stop-name">via ${dirObj.stopName}</div>
                </div>
                <div class="eta-time">${timeStr}</div>
            </div>
        `;
    }
</script>

</body>
</html>
