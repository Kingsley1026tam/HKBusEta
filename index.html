<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HKBusEta</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="HKBus">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <meta name="theme-color" content="#F7F7F9" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-color: #F7F7F9; --surface-color: #FFFFFF; --text-primary: #1D1D1F; --text-secondary: #86868B;
            --brand-color: #FFCC00; --brand-light: rgba(255, 204, 0, 0.2); --brand-text: #1D1D1F;
            --border-soft: #F0F0F2; --nav-bg: #FFFFFF; --nav-icon: #A1A1A6;
            --safe-top: calc(env(safe-area-inset-top, 45px) + 20px);
            --safe-bottom: env(safe-area-inset-bottom, 24px);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212; --surface-color: #1E1E1E; --text-primary: #FFFFFF; --text-secondary: #98989D;
                --brand-color: #FFD60A; --brand-light: rgba(255, 214, 10, 0.2); --border-soft: #2C2C2E; --nav-bg: #1E1E1E;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-color); color: var(--text-primary); height: 100dvh; overflow: hidden; }
        .app-container { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }

        /* Header & Search */
        .header-section { padding: var(--safe-top) 24px 16px; z-index: 10; flex-shrink: 0; }
        .header-section h1 { font-size: 32px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .search-box { 
            display: flex; align-items: center; background: var(--surface-color); border: 1px solid var(--border-soft); 
            border-radius: 16px; padding: 12px 16px; transition: all 0.3s ease; 
        }
        .search-box.kb-active { border-color: var(--brand-color); border-width: 2px; box-shadow: 0 0 12px var(--brand-light); padding: 11px 15px; }
        .search-box input { flex: 1; border: none; background: transparent; font-size: 18px; color: var(--text-primary); outline: none; margin-left: 10px; font-weight: 600; cursor: pointer; }

        /* Pages */
        .page { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        .page.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scrollable-content { flex: 1; overflow-y: auto; padding: 0 24px calc(100px + var(--safe-bottom)); }

        /* List Items */
        .route-item { 
            background: var(--surface-color); border-radius: 16px; padding: 16px; display: flex; align-items: center; 
            gap: 16px; margin-bottom: 12px; border: 1px solid var(--border-soft); 
        }
        .route-badge { 
            color: #fff; font-size: 18px; font-weight: 700; min-width: 65px; height: 44px; 
            display: flex; align-items: center; justify-content: center; border-radius: 12px;
        }
        .badge-kmb { background: #E63946; } .badge-lwb { background: #FFAA00; } .badge-ctb { background: #FFF200; color: #00558e; }
        .eta-tag { background: var(--brand-color); color: var(--brand-text); padding: 4px 8px; border-radius: 8px; font-weight: 700; font-size: 14px; }

        /* Details */
        #map { width: 100%; height: 30vh; border-radius: 0 0 24px 24px; z-index: 5; flex-shrink: 0; }
        .stop-item { display: flex; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border-soft); gap: 12px; }

        /* Navigation */
        .bottom-nav { 
            position: absolute; bottom: 0; width: 100%; background: var(--nav-bg); 
            height: calc(70px + var(--safe-bottom)); border-top: 1px solid var(--border-soft);
            display: flex; justify-content: space-around; align-items: center; padding-bottom: var(--safe-bottom); z-index: 100;
        }
        .bottom-nav.hide { transform: translateY(100%); }
        .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; color: var(--nav-icon); font-size: 11px; cursor: pointer; transition: 0.3s; }
        .nav-tab.active { color: var(--text-primary); }
        .nav-tab svg { width: 24px; height: 24px; margin-bottom: 4px; fill: currentColor; }

        /* Keyboard */
        .custom-kb-overlay {
            position: fixed; bottom: -100%; left: 0; right: 0; background: #D1D5DB; 
            padding: 10px 6px calc(10px + var(--safe-bottom)); z-index: 2000; transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        @media (prefers-color-scheme: dark) { .custom-kb-overlay { background: #2C2C2E; } }
        .custom-kb-overlay.show { bottom: 0; }
        .kb-body { display: flex; gap: 8px; }
        .kb-left { flex: 4; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .kb-right { flex: 3; display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; overflow-y: auto; max-height: 220px; }
        .kb-key { 
            background: #FFF; border-radius: 6px; height: 50px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; font-weight: 600; box-shadow: 0 1px 2px rgba(0,0,0,0.2); cursor: pointer; 
        }
        @media (prefers-color-scheme: dark) { .kb-key { background: #48484A; color: #FFF; } }
        .kb-key.disabled { opacity: 0.2; pointer-events: none; }
        .kb-key:active { background: #AAA; }
        .kb-del { background: #BCC0C6; }
        .kb-zero { grid-column: span 2; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="page-home" class="page active">
        <div class="header-section">
            <h1 id="greeting">搜尋路線</h1>
            <div class="search-box" id="search-box-container">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="routeSearch" placeholder="輸入路線 (如: 1A, 968)" readonly>
            </div>
        </div>
        <div class="scrollable-content" id="main-list"></div>
    </div>

    <div id="page-nearby" class="page">
        <div class="header-section"><h1>附近車站</h1></div>
        <div class="scrollable-content" id="nearby-list"></div>
    </div>

    <div id="page-details" class="page">
        <div id="map"></div>
        <div class="scrollable-content" id="details-list" style="padding-top: 16px;"></div>
    </div>

    <nav class="bottom-nav" id="bottom-nav">
        <div class="nav-tab active" onclick="showPage('home')"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>路線</div>
        <div class="nav-tab" onclick="showPage('nearby')"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>附近</div>
    </nav>

    <div class="custom-kb-overlay" id="customKb">
        <div style="display:flex; justify-content:flex-end; padding-bottom:8px;"><button style="color:#007AFF; font-weight:700; border:none; background:none; font-size:16px;" onclick="closeKeyboard()">完成</button></div>
        <div class="kb-body">
            <div class="kb-left" id="num-pad"></div>
            <div class="kb-right" id="alpha-pad"></div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let allRoutes = [], map, markers = [];
    let currentRoute = null;

    async function init() {
        const h = new Date().getHours();
        document.getElementById('greeting').innerText = (h<12?"早晨":(h<18?"午安":"晚安")) + "！搜尋路線";
        
        // 初始化鍵盤
        initKeyboard();

        try {
            // 同時抓九巴和城巴路線
            const [kmb, ctb] = await Promise.all([
                fetch('https://data.etabus.gov.hk/v1/transport/kmb/route/').then(r => r.json()),
                fetch('https://rt.data.gov.hk/v2/transport/citybus/route/ctb').then(r => r.json())
            ]);
            
            let combined = [];
            kmb.data.forEach(r => combined.push({no: r.route, dest: r.dest_tc, co: 'KMB', dir: r.bound, stype: r.service_type, badge: 'badge-kmb'}));
            ctb.data.forEach(r => combined.push({no: r.route, dest: r.dest_tc, co: 'CTB', dir: 'outbound', stype: '1', badge: 'badge-ctb'}));
            
            allRoutes = combined;
            renderList(allRoutes, 'main-list');
            updateKeyboardState();
        } catch(e) { console.error("Load failed", e); }
    }

    function renderList(list, targetId) {
        const container = document.getElementById(targetId);
        container.innerHTML = list.slice(0, 50).map(r => `
            <div class="route-item" onclick="openRoute('${r.no}', '${r.co}', '${r.dir}', '${r.stype}')">
                <div class="route-badge ${r.badge}">${r.no}</div>
                <div style="flex:1"><strong>往 ${r.dest}</strong><div style="font-size:12px;color:var(--text-secondary)">${r.co} 路線</div></div>
            </div>
        `).join('');
    }

    async function openRoute(no, co, dir, stype) {
        showPage('details');
        const list = document.getElementById('details-list');
        list.innerHTML = "載入車站中...";
        
        if (!map) {
            map = L.map('map', {zoomControl: false}).setView([22.3, 114.1], 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        }
        markers.forEach(m => map.removeLayer(m)); markers = [];

        try {
            let stopUrl = (co === 'KMB') ? 
                `https://data.etabus.gov.hk/v1/transport/kmb/route-stop/${no}/${dir}/${stype}` :
                `https://rt.data.gov.hk/v2/transport/citybus/route-stop/CTB/${no}/${dir}`;
            
            const stopData = await fetch(stopUrl).then(r => r.json());
            const stops = stopData.data;
            
            let html = "";
            for (let s of stops) {
                const sInfo = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop/${s.stop}`).then(r => r.json());
                const name = sInfo.data.name_tc;
                const lat = sInfo.data.lat, lng = sInfo.data.long;
                
                html += `<div class="stop-item" onclick="getETA('${co}','${s.stop}','${no}', this)">
                            <div style="width:24px; text-align:center">${s.seq}</div>
                            <div style="flex:1">${name}</div>
                            <div class="eta-loading">點擊看 ETA</div>
                         </div>`;
                
                let m = L.circleMarker([lat, lng], {radius: 5, color: '#E63946', fillOpacity: 1}).addTo(map);
                markers.push(m);
            }
            list.innerHTML = html;
            if (markers.length) map.fitBounds(L.featureGroup(markers).getBounds(), {padding: [20, 20]});
        } catch(e) { list.innerHTML = "資料加載失敗"; }
    }

    async function getETA(co, stopId, route, el) {
        const etaBox = el.querySelector('.eta-loading') || el.querySelector('.eta-tag');
        etaBox.innerHTML = "...";
        try {
            let url = (co === 'KMB') ? 
                `https://data.etabus.gov.hk/v1/transport/kmb/eta/${stopId}/${route}/1` :
                `https://rt.data.gov.hk/v2/transport/citybus/eta/CTB/${stopId}/${route}`;
            const data = await fetch(url).then(r => r.json());
            const first = data.data[0];
            if (!first || !first.eta) { etaBox.className="eta-tag"; etaBox.innerText = "尾班車已過"; return; }
            const diff = Math.max(0, Math.round((new Date(first.eta) - new Date()) / 60000));
            etaBox.className = "eta-tag";
            etaBox.innerText = diff + " 分鐘";
        } catch(e) { etaBox.innerText = "N/A"; }
    }

    /* 鍵盤與搜尋邏輯 */
    function initKeyboard() {
        const numPad = document.getElementById('num-pad');
        const alphaPad = document.getElementById('alpha-pad');
        
        "123456789".split('').forEach(n => numPad.innerHTML += `<div class="kb-key" data-val="${n}">${n}</div>`);
        numPad.innerHTML += `<div class="kb-key kb-zero" data-val="0">0</div>`;
        numPad.innerHTML += `<div class="kb-key kb-del" data-val="del">←</div>`;
        
        "ABCDE FGHKM NPRST WXYZ".replace(/ /g,'').split('').forEach(l => alphaPad.innerHTML += `<div class="kb-key" data-val="${l}">${l}</div>`);

        document.querySelectorAll('.kb-key').forEach(k => {
            k.onclick = (e) => {
                const val = k.dataset.val;
                const input = document.getElementById('routeSearch');
                if (val === 'del') input.value = input.value.slice(0, -1);
                else input.value += val;
                
                filterRoutes(input.value);
                updateKeyboardState();
            }
        });

        document.getElementById('search-box-container').onclick = openKeyboard;
    }

    function openKeyboard() {
        document.getElementById('customKb').classList.add('show');
        document.getElementById('bottom-nav').classList.add('hide');
        document.getElementById('search-box-container').classList.add('kb-active');
    }

    function closeKeyboard() {
        document.getElementById('customKb').classList.remove('show');
        document.getElementById('bottom-nav').classList.remove('hide');
        document.getElementById('search-box-container').classList.remove('kb-active');
    }

    function filterRoutes(query) {
        const filtered = allRoutes.filter(r => r.no.toUpperCase().startsWith(query.toUpperCase()));
        renderList(filtered, 'main-list');
    }

    function updateKeyboardState() {
        const val = document.getElementById('routeSearch').value.toUpperCase();
        document.querySelectorAll('.kb-key').forEach(k => {
            if (k.dataset.val === 'del') return;
            const testVal = val + k.dataset.val;
            const possible = allRoutes.some(r => r.no.toUpperCase().startsWith(testVal));
            k.classList.toggle('disabled', !possible);
        });
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        closeKeyboard();
    }

    window.onload = init;
</script>

</body>
</html>
